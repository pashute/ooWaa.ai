name: Auto-bump Markdown Versions

on:
  push:
    paths:
      - '**/*.md'

jobs:
  bump-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Bump versions in modified .md files
        run: |
          # Get list of modified .md files in this push
          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"

          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            MODIFIED_FILES=$(git diff --name-only "$AFTER_SHA" | grep '\.md$' || true)
          else
            MODIFIED_FILES=$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" | grep '\.md$' || true)
          fi
          
          if [ -z "$MODIFIED_FILES" ]; then
            echo "No .md files modified"
            exit 0
          fi
          
          for file in $MODIFIED_FILES; do
            if [ -f "$file" ]; then
              # Check if file has version header
              if grep -q "^\*\*Version:\*\*" "$file"; then
                # Extract current version
                CURRENT_VERSION=$(grep "^\*\*Version:\*\*" "$file" | head -1 | sed 's/.*Version:\*\* \([0-9.]*\).*/\1/')
                
                # Increment patch version (1.0.0 -> 1.0.1)
                MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
                MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
                PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
                NEW_PATCH=$((PATCH + 1))
                NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
                
                # Update version and date
                sed -i "s/^\*\*Version:\*\* $CURRENT_VERSION/\*\*Version:\*\* $NEW_VERSION/" "$file"
                sed -i "s/^\*\*Last Updated:\*\* .*/\*\*Last Updated:\*\* $(date +%Y-%m-%d)/" "$file"
                
                echo "Bumped $file: $CURRENT_VERSION -> $NEW_VERSION"
              fi
            fi
          done
      
      - name: Commit version bumps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "No version changes to commit"
          else
            git add -A
            git commit -m "chore: auto-bump doc versions [skip ci]"
            git push
          fi
