<svg viewBox="0 0 900 740" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="15" font-weight="bold">Pillar 1: Orchestration Layer</text>
  <text x="450" y="44" text-anchor="middle" font-size="10" fill="#444">Rule-Based State Machine · Parallel Analysis · Response Routing · LLM Bypass</text>
  <line x1="30" y1="50" x2="870" y2="50" stroke="#000" stroke-width="1"/>

  <!-- INPUT -->
  <rect x="20" y="65" width="860" height="50" rx="6" fill="none" stroke="#000" stroke-width="1.5"/>
  <rect x="20" y="65" width="860" height="22" rx="4" fill="#111"/>
  <text x="450" y="80" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">INPUT — User Message Received</text>
  <text x="120" y="105" text-anchor="middle" font-size="8.5">Raw text / voice input</text>
  <text x="340" y="105" text-anchor="middle" font-size="8.5">Current thread state loaded</text>
  <text x="560" y="105" text-anchor="middle" font-size="8.5">Conversation history available</text>
  <text x="770" y="105" text-anchor="middle" font-size="8.5">Comprehension base pre-fetched</text>

  <line x1="450" y1="115" x2="450" y2="130" stroke="#000" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- PARALLEL ANALYSIS -->
  <rect x="20" y="130" width="860" height="185" rx="6" fill="none" stroke="#000" stroke-width="1.5"/>
  <rect x="20" y="130" width="860" height="22" rx="4" fill="#222"/>
  <text x="450" y="145" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">PARALLEL ANALYSIS PROCESSES  (run simultaneously)</text>

  <!-- Process 1 -->
  <rect x="30" y="158" width="158" height="148" rx="5" fill="none" stroke="#555" stroke-width="1"/>
  <rect x="30" y="158" width="158" height="16" rx="3" fill="#333"/>
  <text x="109" y="169" text-anchor="middle" font-size="7.5" fill="#fff" font-weight="bold">① Topic Detection</text>
  <text x="40" y="185" font-size="7">Input scanned for:</text>
  <text x="40" y="196" font-size="7">▪ New topic signal</text>
  <text x="40" y="207" font-size="7">▪ Topic continuation</text>
  <text x="40" y="218" font-size="7">▪ Topic shift mid-message</text>
  <text x="40" y="229" font-size="7">▪ Multiple topics in one msg</text>
  <line x1="40" y1="234" x2="178" y2="234" stroke="#aaa" stroke-width="0.5"/>
  <text x="40" y="245" font-size="7" fill="#555">Output:</text>
  <text x="40" y="255" font-size="7">topic_list[ ]</text>
  <text x="40" y="265" font-size="7">topic_state: new/cont/shift</text>
  <text x="40" y="278" font-size="6.5" fill="#888">→ flags alignment if new</text>
  <text x="40" y="288" font-size="6.5" fill="#888">→ one response per topic</text>

  <!-- Process 2 -->
  <rect x="196" y="158" width="158" height="148" rx="5" fill="none" stroke="#555" stroke-width="1"/>
  <rect x="196" y="158" width="158" height="16" rx="3" fill="#333"/>
  <text x="275" y="169" text-anchor="middle" font-size="7.5" fill="#fff" font-weight="bold">② Ambiguity + Intent</text>
  <text x="206" y="185" font-size="7">Checks for:</text>
  <text x="206" y="196" font-size="7">▪ Unclear referents</text>
  <text x="206" y="207" font-size="7">▪ Missing parameters</text>
  <text x="206" y="218" font-size="7">▪ Conflicting signals</text>
  <text x="206" y="229" font-size="7">▪ Intent confidence score</text>
  <line x1="206" y1="234" x2="344" y2="234" stroke="#aaa" stroke-width="0.5"/>
  <text x="206" y="245" font-size="7" fill="#555">Output:</text>
  <text x="206" y="255" font-size="7">intent: confirmed/ambiguous</text>
  <text x="206" y="265" font-size="7">missing_params[ ]</text>
  <text x="206" y="278" font-size="6.5" fill="#888">→ triggers clarify Q if needed</text>
  <text x="206" y="288" font-size="6.5" fill="#888">→ subtle indirect questioning</text>

  <!-- Process 3 -->
  <rect x="362" y="158" width="158" height="148" rx="5" fill="none" stroke="#555" stroke-width="1"/>
  <rect x="362" y="158" width="158" height="16" rx="3" fill="#333"/>
  <text x="441" y="169" text-anchor="middle" font-size="7.5" fill="#fff" font-weight="bold">③ Knowledge Gap Scan</text>
  <text x="372" y="185" font-size="7">Searches for:</text>
  <text x="372" y="196" font-size="7">▪ Missing source info</text>
  <text x="372" y="207" font-size="7">▪ Unverified claims</text>
  <text x="372" y="218" font-size="7">▪ Controversial assertions</text>
  <text x="372" y="229" font-size="7">▪ Guesses / low confidence</text>
  <line x1="372" y1="234" x2="510" y2="234" stroke="#aaa" stroke-width="0.5"/>
  <text x="372" y="245" font-size="7" fill="#555">Output:</text>
  <text x="372" y="255" font-size="7">gaps[ ] with severity</text>
  <text x="372" y="265" font-size="7">disposition: discuss/notify</text>
  <text x="372" y="278" font-size="6.5" fill="#888">         /research/log</text>
  <text x="372" y="288" font-size="6.5" fill="#888">→ per discussion importance</text>

  <!-- Process 4 -->
  <rect x="528" y="158" width="158" height="148" rx="5" fill="none" stroke="#555" stroke-width="1"/>
  <rect x="528" y="158" width="158" height="16" rx="3" fill="#333"/>
  <text x="607" y="169" text-anchor="middle" font-size="7.5" fill="#fff" font-weight="bold">④ Instruction Parse</text>
  <text x="538" y="185" font-size="7">Detects:</text>
  <text x="538" y="196" font-size="7">▪ Explicit instructions</text>
  <text x="538" y="207" font-size="7">▪ Param value changes</text>
  <text x="538" y="218" font-size="7">▪ Timeout / state expiry</text>
  <text x="538" y="229" font-size="7">▪ User decisions / overrides</text>
  <line x1="538" y1="234" x2="676" y2="234" stroke="#aaa" stroke-width="0.5"/>
  <text x="538" y="245" font-size="7" fill="#555">Output:</text>
  <text x="538" y="255" font-size="7">instructions[ ]</text>
  <text x="538" y="265" font-size="7">param_delta{ }</text>
  <text x="538" y="278" font-size="6.5" fill="#888">→ updates thread state</text>
  <text x="538" y="288" font-size="6.5" fill="#888">→ stored in Experience.kg</text>

  <!-- Process 5 -->
  <rect x="694" y="158" width="176" height="148" rx="5" fill="none" stroke="#555" stroke-width="1"/>
  <rect x="694" y="158" width="176" height="16" rx="3" fill="#333"/>
  <text x="782" y="169" text-anchor="middle" font-size="7.5" fill="#fff" font-weight="bold">⑤ Reliability Assessment</text>
  <text x="704" y="185" font-size="7">Evaluates:</text>
  <text x="704" y="196" font-size="7">▪ Criticality of response</text>
  <text x="704" y="207" font-size="7">▪ Need for verification</text>
  <text x="704" y="218" font-size="7">▪ LLM required? (y/n)</text>
  <text x="704" y="229" font-size="7">▪ Parallel verify needed?</text>
  <line x1="704" y1="234" x2="860" y2="234" stroke="#aaa" stroke-width="0.5"/>
  <text x="704" y="245" font-size="7" fill="#555">Output:</text>
  <text x="704" y="255" font-size="7">llm_needed: true/false</text>
  <text x="704" y="265" font-size="7">verify_mode: parallel/defer</text>
  <text x="704" y="278" font-size="6.5" fill="#888">→ may bypass LLM entirely</text>
  <text x="704" y="288" font-size="6.5" fill="#888">→ defaults to rule-based path</text>

  <line x1="450" y1="315" x2="450" y2="332" stroke="#000" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- STATE EVALUATOR -->
  <rect x="20" y="332" width="860" height="70" rx="6" fill="none" stroke="#000" stroke-width="1.5"/>
  <rect x="20" y="332" width="860" height="22" rx="4" fill="#111"/>
  <text x="450" y="347" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">STATE EVALUATOR — Assembles analysis outputs · Determines response strategy</text>
  <text x="130" y="372" text-anchor="middle" font-size="8">topics confirmed?</text>
  <text x="310" y="372" text-anchor="middle" font-size="8">intent clear?</text>
  <text x="450" y="372" text-anchor="middle" font-size="8">gaps flagged?</text>
  <text x="600" y="372" text-anchor="middle" font-size="8">instructions parsed?</text>
  <text x="770" y="372" text-anchor="middle" font-size="8">reliability level?</text>
  <text x="130" y="386" text-anchor="middle" font-size="7" fill="#888">→ set response sections</text>
  <text x="310" y="386" text-anchor="middle" font-size="7" fill="#888">→ clarify or proceed</text>
  <text x="450" y="386" text-anchor="middle" font-size="7" fill="#888">→ notify / research</text>
  <text x="600" y="386" text-anchor="middle" font-size="7" fill="#888">→ update state</text>
  <text x="770" y="386" text-anchor="middle" font-size="7" fill="#888">→ route to output</text>

  <line x1="450" y1="402" x2="450" y2="418" stroke="#000" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- ROUTING -->
  <rect x="20" y="418" width="860" height="200" rx="6" fill="none" stroke="#000" stroke-width="1.5"/>
  <rect x="20" y="418" width="860" height="22" rx="4" fill="#222"/>
  <text x="450" y="433" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">ROUTING — Response Strategy Selected</text>

  <!-- Route A -->
  <rect x="30" y="448" width="155" height="158" rx="5" fill="none" stroke="#555" stroke-width="1"/>
  <rect x="30" y="448" width="155" height="16" rx="3" fill="#333"/>
  <text x="107" y="459" text-anchor="middle" font-size="7.5" fill="#fff" font-weight="bold">A — Clarify with User</text>
  <text x="40" y="475" font-size="7">Triggered when:</text>
  <text x="40" y="486" font-size="7">▪ Intent ambiguous</text>
  <text x="40" y="497" font-size="7">▪ Critical param missing</text>
  <text x="40" y="508" font-size="7">▪ New topic detected</text>
  <text x="40" y="519" font-size="7">▪ Alignment needed</text>
  <line x1="40" y1="524" x2="175" y2="524" stroke="#aaa" stroke-width="0.5"/>
  <text x="40" y="535" font-size="7" fill="#555">Action:</text>
  <text x="40" y="546" font-size="7">Ask subtle question</text>
  <text x="40" y="557" font-size="7">No LLM invoked</text>
  <text x="40" y="568" font-size="7">Wait for response</text>
  <text x="40" y="582" font-size="6.5" fill="#888">→ rule-based only</text>
  <text x="40" y="592" font-size="6.5" fill="#888">→ fast, reliable</text>

  <!-- Route B -->
  <rect x="196" y="448" width="155" height="158" rx="5" fill="none" stroke="#555" stroke-width="1"/>
  <rect x="196" y="448" width="155" height="16" rx="3" fill="#333"/>
  <text x="273" y="459" text-anchor="middle" font-size="7.5" fill="#fff" font-weight="bold">B — Rule-Based Response</text>
  <text x="206" y="475" font-size="7">Triggered when:</text>
  <text x="206" y="486" font-size="7">▪ Intent clear</text>
  <text x="206" y="497" font-size="7">▪ Answer in comp. base</text>
  <text x="206" y="508" font-size="7">▪ LLM not needed</text>
  <text x="206" y="519" font-size="7">▪ Low criticality</text>
  <line x1="206" y1="524" x2="341" y2="524" stroke="#aaa" stroke-width="0.5"/>
  <text x="206" y="535" font-size="7" fill="#555">Action:</text>
  <text x="206" y="546" font-size="7">Traverse comp. base</text>
  <text x="206" y="557" font-size="7">Assemble response</text>
  <text x="206" y="568" font-size="7">LLM bypassed entirely</text>
  <text x="206" y="582" font-size="6.5" fill="#888">→ deterministic</text>
  <text x="206" y="592" font-size="6.5" fill="#888">→ verifiable output</text>

  <!-- Route C -->
  <rect x="362" y="448" width="155" height="158" rx="5" fill="none" stroke="#555" stroke-width="1"/>
  <rect x="362" y="448" width="155" height="16" rx="3" fill="#333"/>
  <text x="439" y="459" text-anchor="middle" font-size="7.5" fill="#fff" font-weight="bold">C — Invoke Tool</text>
  <text x="372" y="475" font-size="7">Triggered when:</text>
  <text x="372" y="486" font-size="7">▪ External data needed</text>
  <text x="372" y="497" font-size="7">▪ Task execution required</text>
  <text x="372" y="508" font-size="7">▪ Verification needed</text>
  <text x="372" y="519" font-size="7">▪ App control needed</text>
  <line x1="372" y1="524" x2="507" y2="524" stroke="#aaa" stroke-width="0.5"/>
  <text x="372" y="535" font-size="7" fill="#555">Action:</text>
  <text x="372" y="546" font-size="7">Select tool from registry</text>
  <text x="372" y="557" font-size="7">Execute via Dynamait</text>
  <text x="372" y="568" font-size="7">Return result to state</text>
  <text x="372" y="582" font-size="6.5" fill="#888">→ structured instruction</text>
  <text x="372" y="592" font-size="6.5" fill="#888">→ failover to human</text>

  <!-- Route D -->
  <rect x="528" y="448" width="155" height="158" rx="5" fill="none" stroke="#555" stroke-width="1"/>
  <rect x="528" y="448" width="155" height="16" rx="3" fill="#333"/>
  <text x="605" y="459" text-anchor="middle" font-size="7.5" fill="#fff" font-weight="bold">D — LLM + Verify</text>
  <text x="538" y="475" font-size="7">Triggered when:</text>
  <text x="538" y="486" font-size="7">▪ Complex reasoning needed</text>
  <text x="538" y="497" font-size="7">▪ New frontier topic</text>
  <text x="538" y="508" font-size="7">▪ Comp. base insufficient</text>
  <text x="538" y="519" font-size="7">▪ High criticality</text>
  <line x1="538" y1="524" x2="673" y2="524" stroke="#aaa" stroke-width="0.5"/>
  <text x="538" y="535" font-size="7" fill="#555">Action:</text>
  <text x="538" y="546" font-size="7">Enrich prompt with context</text>
  <text x="538" y="557" font-size="7">Call LLM</text>
  <text x="538" y="568" font-size="7">Parallel verify result</text>
  <text x="538" y="582" font-size="6.5" fill="#888">→ LLM at periphery</text>
  <text x="538" y="592" font-size="6.5" fill="#888">→ result assessed on return</text>

  <!-- Route E -->
  <rect x="694" y="448" width="176" height="158" rx="5" fill="none" stroke="#555" stroke-width="1"/>
  <rect x="694" y="448" width="176" height="16" rx="3" fill="#333"/>
  <text x="782" y="459" text-anchor="middle" font-size="7.5" fill="#fff" font-weight="bold">E — Defer / Partial Response</text>
  <text x="704" y="475" font-size="7">Triggered when:</text>
  <text x="704" y="486" font-size="7">▪ Params insufficient yet</text>
  <text x="704" y="497" font-size="7">▪ Research in progress</text>
  <text x="704" y="508" font-size="7">▪ Awaiting tool result</text>
  <text x="704" y="519" font-size="7">▪ User confirmation pending</text>
  <line x1="704" y1="524" x2="860" y2="524" stroke="#aaa" stroke-width="0.5"/>
  <text x="704" y="535" font-size="7" fill="#555">Action:</text>
  <text x="704" y="546" font-size="7">Give partial fast answer</text>
  <text x="704" y="557" font-size="7">Continue in background</text>
  <text x="704" y="568" font-size="7">Deliver full answer later</text>
  <text x="704" y="582" font-size="6.5" fill="#888">→ Kahneman fast+slow</text>
  <text x="704" y="592" font-size="6.5" fill="#888">→ never blocks the user</text>

  <!-- OUTPUT -->
  <line x1="450" y1="618" x2="450" y2="632" stroke="#000" stroke-width="1.5" marker-end="url(#arr3)"/>
  <rect x="20" y="632" width="860" height="48" rx="6" fill="none" stroke="#000" stroke-width="1.5"/>
  <rect x="20" y="632" width="860" height="20" rx="4" fill="#111"/>
  <text x="450" y="646" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">OUTPUT — Response assembled per-topic · Thread state updated · Loop continues</text>
  <text x="160" y="668" text-anchor="middle" font-size="8">One response per topic</text>
  <text x="370" y="668" text-anchor="middle" font-size="8">Breadcrumb updated</text>
  <text x="560" y="668" text-anchor="middle" font-size="8">Experience.kg written</text>
  <text x="760" y="668" text-anchor="middle" font-size="8">Orchestration re-evaluates next turn</text>

  <defs>
    <marker id="arr3" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <line x1="20" y1="718" x2="880" y2="718" stroke="#000" stroke-width="0.5"/>
  <text x="450" y="732" text-anchor="middle" font-size="7.5" fill="#666">Overstand Patent · System and Method for Reliable Attentive AI Collaboration · Fig. 1: Orchestration Layer State Machine</text>
</svg>
