  <text x="48" y="452" font-size="7">Term: bilabial stop · Class: phoneme</text>
  <text x="48" y="463" font-size="7">Definition: labial consonant, no labiodental</text>
  <text x="48" y="474" font-size="7">fricative equivalent in early Akkadian</text>
  <text x="48" y="485" font-size="7">Source: GZ Lexicon (Ungnad 1906) · conf: med</text>

  <text x="40" y="502" font-size="7.5" font-weight="bold">Thesaurus Links:</text>
  <text x="40" y="513" font-size="7">B → {bilabial, labial stop, plosive}</text>
  <text x="40" y="523" font-size="7">V → {labiodental, fricative, absent}</text>
  <text x="40" y="533" font-size="7">GZ → {Geez, Ethiopic, South Semitic}</text>

  <text x="40" y="549" font-size="7.5" font-weight="bold">Textbook Example:</text>
  <rect x="40" y="553" width="245" height="42" rx="3" fill="#f0f0f0" stroke="#ccc" stroke-width="0.8"/>
  <text x="48" y="565" font-size="7" font-style="italic">"In GZ script, the bilabial stop [b]</text>
  <text x="48" y="575" font-size="7" font-style="italic"> has no fricative counterpart. MS S799</text>
  <text x="48" y="585" font-size="7" font-style="italic"> sign ◁ = /b/, not /v/."</text>
  <text x="48" y="595" font-size="6.5" fill="#888">— Ungnad, Akkadian Grammar, 1906, §12</text>
  <text x="40" y="610" font-size="6" fill="#888" font-style="italic">reliability score: 0.72 · verified: pending</text>

