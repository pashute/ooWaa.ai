version: '3.8'

services:
  nats:
    image: nats:latest
    container_name: oowaa-nats
    ports:
      - "4222:4222"  # Client connections
      - "8222:8222"  # HTTP monitoring
      - "6222:6222"  # Routing port for clustering
    command: 
      - "--http_port"
      - "8222"
    restart: unless-stopped
    networks:
      - oowaa-network

  memgraph:
    image: memgraph/memgraph:latest
    container_name: oowaa-memgraph
    ports:
      - "7687:7687"   # Bolt protocol
      - "7444:7444"   # HTTP monitoring
    restart: unless-stopped
    networks:
      - oowaa-network

networks:
  oowaa-network:
    driver: bridge
